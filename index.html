<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body {
            background: radial-gradient(at top left, #6366f1, transparent),
                        radial-gradient(at bottom right, #3b82f6, transparent),
                        radial-gradient(at bottom left, #ec4899, transparent);
            background-color: #0f172a;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(240px); opacity: 1; }
        }
        
        #scan-line {
            animation: bounce 2.5s infinite ease-in-out;
        }
    </style>
</head>
<body class="font-sans min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full mx-auto p-6">
        <header class="py-6 text-center">
            <h1 class="text-4xl font-black text-white tracking-tighter drop-shadow-lg">Attendance <span class="text-blue-400">Pro</span></h1>
            <p class="text-blue-100/70 mt-2 text-sm font-medium">SOPHISTICATED SCANNING SYSTEM</p>
        </header>

        <div id="setup-container" class="text-center py-10">
            <button onclick="startCamera()" class="glass px-10 py-5 rounded-[2rem] text-white font-bold text-lg shadow-xl hover:bg-white/20 transition-all active:scale-95 border border-white/30">
                <span class="flex items-center gap-3">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Start Scanner
                </span>
            </button>
            <p class="text-white/40 text-xs mt-4 uppercase tracking-widest">Enable camera permission after clicking</p>
        </div>

        <div id="scanner-container" class="hidden relative glass rounded-[2.5rem] overflow-hidden shadow-2xl p-3">
            <div class="relative rounded-[2rem] overflow-hidden aspect-square bg-black">
                <video id="video" class="w-full h-full object-cover" playsinline></video>
                <canvas id="canvas" class="hidden"></canvas>
                
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="w-64 h-64 border-[1px] border-white/40 rounded-3xl"></div>
                    <div id="scan-line" class="absolute w-64 h-1 bg-gradient-to-r from-transparent via-blue-400 to-transparent shadow-[0_0_20px_#60a5fa] top-1/4"></div>
                </div>
            </div>
            <div id="loading-msg" class="py-4 text-center text-white/60 font-medium text-[10px] tracking-widest uppercase">
                Initializing secure camera feed...
            </div>
        </div>

        <div id="modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-md flex items-center justify-center p-6 z-50">
            <div class="glass text-white rounded-[2.5rem] w-full max-w-sm p-8 shadow-2xl border border-white/30 transform transition-all">
                <div class="w-16 h-16 bg-blue-500/20 rounded-2xl flex items-center justify-center mb-6 mx-auto border border-blue-400/30">
                    <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                
                <h3 class="text-2xl font-bold text-center mb-1">Verify Identity</h3>
                <p class="text-sm text-blue-100/60 text-center mb-8 italic">Ready for sheet integration</p>
                
                <div class="bg-white/5 border border-white/10 p-5 rounded-2xl mb-8">
                    <span class="text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em]">Profile Data</span>
                    <div id="scannedInfo" class="text-lg font-mono text-white mt-1 break-all">--</div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="closeModal()" class="py-4 text-white/70 font-bold hover:text-white transition-all">Cancel</button>
                    <button onclick="submitToSheet()" id="submitBtn" class="py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/20 active:scale-95 transition-all">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAyAlLS06VDoPH6gC4qp9pPRsWjyhWlmzwcepZd8FPSzTejrTjmVy_6o7fkY3_v91O/exec"; 
        const video = document.getElementById("video");
        const canvasElement = document.getElementById("canvas");
        const canvas = canvasElement.getContext("2d");
        const loadingMsg = document.getElementById("loading-msg");
        const modal = document.getElementById("modal");
        const scannedInfoText = document.getElementById("scannedInfo");
        const setupContainer = document.getElementById("setup-container");
        const scannerContainer = document.getElementById("scanner-container");
        
        let scanning = false;
        let lastResult = null;

        function startCamera() {
            setupContainer.classList.add("hidden");
            scannerContainer.classList.remove("hidden");
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(function(stream) {
                    video.srcObject = stream;
                    video.setAttribute("playsinline", true);
                    video.play();
                    loadingMsg.innerText = "Secure Connection Active";
                    scanning = true;
                    requestAnimationFrame(tick);
                })
                .catch(err => {
                    loadingMsg.innerText = "Access Denied: " + err.message;
                    loadingMsg.classList.add("text-red-400");
                });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                
                var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                var code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    onScanSuccess(code.data);
                }
            }
            requestAnimationFrame(tick);
        }

        function onScanSuccess(data) {
            scanning = false;
            lastResult = data;
            scannedInfoText.innerText = data;
            modal.classList.remove("hidden");
        }

        function closeModal() {
            modal.classList.add("hidden");
            lastResult = null;
            setTimeout(() => { scanning = true; }, 1000);
        }

        async function submitToSheet() {
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "Syncing...";

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        id: lastResult,
                        info: "Checked In"
                    })
                });

                alert("Attendance recorded successfully.");
                closeModal();
            } catch (e) {
                alert("Network error. Try again.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirm";
            }
        }
    </script>
</body>
</html>
