<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WCGNHS Attendance Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e3a8a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            color: #1e3a8a;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .app-shell {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 90px; 
        }

        .card { 
            background: white; 
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            padding: 12px 0 28px 0; 
            z-index: 100;
        }

        #scan-line {
            height: 4px;
            background: #3b82f6;
            box-shadow: 0 0 15px #3b82f6;
            position: absolute;
            width: 100%;
            animation: scan 2.5s infinite ease-in-out;
            z-index: 10;
        }

        @keyframes scan {
            0%, 100% { top: 5%; }
            50% { top: 95%; }
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item.active { color: #2563eb; }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%231e3a8a' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1.2rem;
        }

        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="app-shell px-5 pt-8">
        
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-xl font-black text-blue-900 tracking-tighter uppercase">Attendance<span class="text-blue-500">Pro</span></h1>
                <p class="text-[9px] font-bold text-slate-400 tracking-[0.3em] uppercase">WCGNHS Terminal</p>
            </div>
            <div class="bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-full border border-emerald-100 flex items-center gap-2">
                <span class="h-2 w-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold uppercase">Online</span>
            </div>
        </header>

        <div id="main-view">
            <div class="card p-1.5 flex bg-slate-100 mb-6">
                <button onclick="setStatus('Time In')" id="btn-in" class="flex-1 py-3 rounded-2xl text-xs font-black transition-all bg-white text-blue-600 shadow-sm">TIME IN</button>
                <button onclick="setStatus('Time Out')" id="btn-out" class="flex-1 py-3 rounded-2xl text-xs font-black transition-all text-slate-500">TIME OUT</button>
            </div>

            <div class="card p-6 space-y-5 mb-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Grade & Section</label>
                    <select id="section" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-4 text-sm font-bold text-blue-900 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option>Grade 7 - ALEXANDRITE</option>
                        <option>Grade 7 - RUBY</option>
                        <option>Grade 8 - AQUAMARINE</option>
                        <option>Grade 8 - DIAMOND</option>
                        <option>Grade 9 - AMETHYST</option>
                        <option>Grade 9 - MOONSTONE</option>
                        <option>Grade 10 - EMERALD</option>
                        <option>Grade 10 - JADE</option>
                        <option>Grade 11 - ABM</option>
                        <option>Grade 11 - HUMSS</option>
                        <option>Grade 11 - TVL</option>
                        <option>Grade 12 - ABM</option>
                        <option>Grade 12 - HUMSS</option>
                        <option>Grade 12 - TVL</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Current Subject</label>
                    <select id="subject" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-4 text-sm font-bold text-blue-900 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option>ENGLISH</option>
                            <option>MATHEMATICS</option>
                        <option>SCIENCE</option>
                        <option>FILIPINO</option>
                        <option>HISTORY</option>
                        <option>ICT Specialization</option>
                    </select>
                </div>
            </div>

            <button onclick="initCamera()" class="btn-press w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-3xl shadow-xl shadow-blue-200 transition-all flex items-center justify-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                OPEN CAMERA
            </button>
        </div>

        <div id="scanner-view" class="hidden fixed inset-0 bg-black z-[200] flex flex-col">
            <div class="relative flex-1">
                <video id="video" class="w-full h-full object-cover"></video>
                <canvas id="canvas" class="hidden"></canvas>
                <div id="scan-line"></div>
                
                <div class="absolute inset-0 flex flex-col justify-between p-8">
                    <button onclick="stopCamera()" class="self-end bg-white/20 backdrop-blur-md p-3 rounded-full text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <div class="border-2 border-white/30 rounded-3xl aspect-square w-full max-w-[280px] mx-auto flex items-center justify-center">
                        <p class="text-white/50 text-[10px] font-bold uppercase tracking-widest">Align QR Code</p>
                    </div>
                    <div class="text-center text-white pb-10">
                        <p class="text-xs font-bold uppercase tracking-widest opacity-70">Scanning for Student QR...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
            <h2 class="text-2xl font-black text-blue-900 mb-6">Confirm Attendance</h2>
            
            <div class="space-y-4 mb-10">
                <div class="p-5 bg-blue-50 rounded-3xl border border-blue-100">
                    <span class="text-[10px] font-black text-blue-400 uppercase tracking-wider">Student ID / Name</span>
                    <div id="qr-result" class="text-xl font-black text-blue-900 mt-1 break-all">--</div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="px-5 py-3 bg-slate-50 rounded-2xl">
                        <span class="text-[9px] font-black text-slate-400 uppercase">Section</span>
                        <p id="confirm-section" class="text-xs font-bold text-blue-900"></p>
                    </div>
                    <div class="px-5 py-3 bg-slate-50 rounded-2xl">
                        <span class="text-[9px] font-black text-slate-400 uppercase">Type</span>
                        <p id="confirm-status" class="text-xs font-bold text-blue-900"></p>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mb-6">
                <button onclick="closeModal()" class="flex-1 py-5 bg-slate-100 text-slate-500 font-black rounded-3xl btn-press transition-all">RETRY</button>
                <button id="confirm-btn" onclick="sendData()" class="flex-2 w-[60%] py-5 bg-blue-600 text-white font-black rounded-3xl shadow-lg shadow-blue-200 btn-press transition-all uppercase tracking-widest">Submit</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            Home
        </div>
        <div class="nav-item" onclick="openMonitor()">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Logs
        </div>
        <div class="nav-item" onclick="alert('Profile settings available in next update.')">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            Profile
        </div>
    </nav>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxonEugZt2Xj0ZQLhvhQDJpOCmZeesN3CH7EE-eQhIEaKC2FtktQfbMws4yyvFMe8BW/exec"; 
        let currentStatus = "Time In";
        let scanning = false;
        let qrData = null;

        const video = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvas = canvasElement.getContext('2d');

        function openMonitor() {
            window.open('monitor.html', '_blank');
        }

        function setStatus(s) {
            currentStatus = s;
            const btnIn = document.getElementById('btn-in');
            const btnOut = document.getElementById('btn-out');
            if(s === 'Time In') {
                btnIn.className = "flex-1 py-3 rounded-2xl text-xs font-black transition-all bg-white text-blue-600 shadow-sm";
                btnOut.className = "flex-1 py-3 rounded-2xl text-xs font-black transition-all text-slate-500";
            } else {
                btnOut.className = "flex-1 py-3 rounded-2xl text-xs font-black transition-all bg-white text-blue-600 shadow-sm";
                btnIn.className = "flex-1 py-3 rounded-2xl text-xs font-black transition-all text-slate-500";
            }
        }

        async function initCamera() {
            document.getElementById('scanner-view').classList.remove('hidden');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                scanning = true;
                requestAnimationFrame(tick);
            } catch (err) {
                alert("Please enable camera permissions.");
            }
        }

        function stopCamera() {
            scanning = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            document.getElementById('scanner-view').classList.add('hidden');
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                canvasElement.width = video.videoWidth; 
                canvasElement.height = video.videoHeight;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                const img = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(img.data, img.width, img.height);
                if (code) {
                    qrData = code.data;
                    if (navigator.vibrate) navigator.vibrate(50);
                    showModal();
                }
            }
            if (scanning) requestAnimationFrame(tick);
        }

        function showModal() {
            scanning = false;
            document.getElementById('qr-result').innerText = qrData;
            document.getElementById('confirm-section').innerText = document.getElementById('section').value;
            document.getElementById('confirm-status').innerText = currentStatus;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            qrData = null;
            setTimeout(() => { scanning = true; tick(); }, 1000);
        }

        async function sendData() {
            const btn = document.getElementById('confirm-btn');
            btn.disabled = true; 
            btn.innerText = "WAIT...";

            const payload = {
                rawData: qrData,
                section: document.getElementById('section').value,
                subject: document.getElementById('subject').value,
                status: currentStatus
            };

            try {
                // Using a standard fetch logic. Note: 'no-cors' limits our ability to see response body, 
                // but successfully triggers the script execution.
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                alert("Success! Attendance recorded.");
                closeModal();
                stopCamera();
            } catch (e) {
                alert("Connection error. Please try again.");
                console.error(e);
            } finally {
                btn.disabled = false; 
                btn.innerText = "SUBMIT";
            }
        }
    </script>
</body>
</html>
