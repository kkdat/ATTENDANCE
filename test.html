<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
            min-height: 100vh;
        }
        .card { 
            background: white; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05); 
        }
        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        #scan-line {
            height: 2px;
            background: #4f46e5;
            box-shadow: 0 0 15px #6366f1;
            position: absolute;
            width: 100%;
            animation: scan 3s infinite linear;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="flex flex-col items-center py-12 px-4">

    <div class="w-full max-w-lg mb-8 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">Attendance<span class="text-indigo-600">Pro</span></h1>
            <p class="text-slate-500 text-xs font-semibold uppercase tracking-widest">Registry Portal</p>
        </div>
        <div class="text-right">
            <div class="flex items-center text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100">
                <span class="status-dot bg-emerald-500 animate-pulse"></span> System Active
            </div>
        </div>
    </div>

    <div class="card w-full max-w-lg rounded-2xl p-8 mb-6">
        <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
            <button onclick="setStatus('Time In')" id="btn-in" class="flex-1 py-2.5 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-indigo-600">TIME IN</button>
            <button onclick="setStatus('Time Out')" id="btn-out" class="flex-1 py-2.5 rounded-lg text-xs font-bold transition-all text-slate-500">TIME OUT</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1">Grade & Section</label>
                <select id="section" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <option>Grade 11 - Emerald</option>
                    <option>Grade 11 - Diamond</option>
                    <option>Grade 12 - Ruby</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1">Current Subject</label>
                <select id="subject" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <option>Practical Research</option>
                    <option>General Mathematics</option>
                    <option>ICT Specialization</option>
                </select>
            </div>
        </div>
    </div>

    <div id="setup-view" class="w-full max-w-lg">
        <button onclick="initCamera()" class="w-full py-4 bg-slate-900 hover:bg-black text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
            Initialize Secure Scanner
        </button>
    </div>

    <div id="scanner-view" class="hidden w-full max-w-lg card rounded-2xl p-3">
        <div class="relative rounded-xl overflow-hidden aspect-square bg-slate-900">
            <video id="video" class="w-full h-full object-cover grayscale-[0.2]"></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div id="scan-line"></div>
            <div class="absolute inset-0 border-[40px] border-black/40 pointer-events-none"></div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-2xl p-8 shadow-2xl border border-slate-200">
            <div class="flex items-center gap-3 mb-6 text-indigo-600">
                <div class="p-2 bg-indigo-50 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2 class="text-xl font-bold text-slate-900">Confirm Log</h2>
            </div>
            
            <div class="space-y-4 mb-8">
                <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Identity Detected</span>
                    <div id="qr-result" class="text-lg font-bold text-slate-800 mt-1 truncate">--</div>
                </div>
                <div id="modal-details" class="text-xs font-semibold text-slate-500 space-y-2 px-1">
                    </div>
            </div>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 text-slate-500 font-bold hover:bg-slate-50 rounded-xl transition-all">Cancel</button>
                <button id="confirm-btn" onclick="sendData()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-md hover:bg-indigo-700 active:scale-95 transition-all">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGS_QWW5aYXiD-7_MuBYsu9SX8qehvVDcPeXAgZDQgQjcTiLkqqQI1mHQRESv5dkU/exec"; 
        let currentStatus = "Time In";
        let scanning = false;
        let qrData = null;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas').getContext('2d');

        function setStatus(s) {
            currentStatus = s;
            const btnIn = document.getElementById('btn-in');
            const btnOut = document.getElementById('btn-out');
            if(s === 'Time In') {
                btnIn.className = "flex-1 py-2.5 rounded-lg text-xs font-bold bg-white shadow-sm text-indigo-600";
                btnOut.className = "flex-1 py-2.5 rounded-lg text-xs font-bold text-slate-500";
            } else {
                btnOut.className = "flex-1 py-2.5 rounded-lg text-xs font-bold bg-white shadow-sm text-rose-600";
                btnIn.className = "flex-1 py-2.5 rounded-lg text-xs font-bold text-slate-500";
            }
        }

        async function initCamera() {
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('scanner-view').classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            scanning = true;
            requestAnimationFrame(tick);
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                const cvs = document.getElementById('canvas');
                cvs.width = video.videoWidth; 
                cvs.height = video.videoHeight;
                canvas.drawImage(video, 0, 0, cvs.width, cvs.height);
                const img = canvas.getImageData(0, 0, cvs.width, cvs.height);
                const code = jsQR(img.data, img.width, img.height);
                if (code) {
                    qrData = code.data;
                    showModal();
                }
            }
            if (scanning) requestAnimationFrame(tick);
        }

        function showModal() {
            scanning = false;
            document.getElementById('qr-result').innerText = qrData;
            document.getElementById('modal-details').innerHTML = `
                <div class="flex justify-between"><span>Section</span><span class="text-slate-900">${document.getElementById('section').value}</span></div>
                <div class="flex justify-between"><span>Subject</span><span class="text-slate-900">${document.getElementById('subject').value}</span></div>
                <div class="flex justify-between"><span>Status</span><span class="${currentStatus === 'Time In' ? 'text-indigo-600' : 'text-rose-600'}">${currentStatus}</span></div>
            `;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            qrData = null;
            setTimeout(() => { scanning = true; tick(); }, 1200);
        }

        async function sendData() {
            const btn = document.getElementById('confirm-btn');
            btn.disabled = true; 
            btn.innerText = "Processing...";

            const payload = {
                timestamp: new Date().toLocaleString(),
                rawData: qrData,
                section: document.getElementById('section').value,
                subject: document.getElementById('subject').value,
                status: currentStatus
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                closeModal();
            } catch (e) {
                alert("Network failure. Check connection.");
            } finally {
                btn.disabled = false; 
                btn.innerText = "Confirm";
            }
        }
    </script>
</body>
</html>
