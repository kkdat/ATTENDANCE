<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <div class="max-w-md mx-auto p-4">
        <header class="py-8 text-center">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Attendance System</h1>
            <p class="text-gray-500 mt-2">Position the QR code within the frame</p>
        </header>

        <div class="relative bg-white rounded-3xl overflow-hidden shadow-2xl border-4 border-white aspect-square">
            <video id="video" class="w-full h-full object-cover" playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>
            
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="w-64 h-64 border-2 border-blue-500 rounded-2xl opacity-60"></div>
                <div id="scan-line" class="absolute w-64 h-1 bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.8)] top-1/4 animate-bounce"></div>
            </div>
        </div>

        <div id="loading-msg" class="mt-4 text-center text-gray-500 italic text-sm">
            Requesting camera access...
        </div>

        <div id="modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 z-50">
            <div class="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl transform transition-all">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-4 mx-auto">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-center text-gray-800 mb-1">Confirm Details</h3>
                <p class="text-sm text-gray-500 text-center mb-6">Verify the information below</p>
                
                <div class="bg-gray-50 border border-gray-100 p-4 rounded-2xl mb-8">
                    <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Scanned Data</span>
                    <div id="scannedInfo" class="text-lg font-mono text-gray-700 mt-1 break-all">--</div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="closeModal()" class="py-4 text-gray-600 font-bold hover:bg-gray-100 rounded-2xl transition">Cancel</button>
                    <button onclick="submitToSheet()" id="submitBtn" class="py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAyAlLS06VDoPH6gC4qp9pPRsWjyhWlmzwcepZd8FPSzTejrTjmVy_6o7fkY3_v91O/exec"; // PASTE YOUR URL HERE
        const video = document.getElementById("video");
        const canvasElement = document.getElementById("canvas");
        const canvas = canvasElement.getContext("2d");
        const loadingMsg = document.getElementById("loading-msg");
        const modal = document.getElementById("modal");
        const scannedInfoText = document.getElementById("scannedInfo");
        
        let scanning = true;
        let lastResult = null;

        // Start Camera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) {
                video.srcObject = stream;
                video.setAttribute("playsinline", true); // required for iOS
                video.play();
                loadingMsg.innerText = "Camera Active";
                requestAnimationFrame(tick);
            })
            .catch(err => {
                loadingMsg.innerText = "Error: " + err.message;
                loadingMsg.classList.add("text-red-500");
            });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                
                var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                var code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    onScanSuccess(code.data);
                }
            }
            requestAnimationFrame(tick);
        }

        function onScanSuccess(data) {
            scanning = false; // Pause scanning
            lastResult = data;
            scannedInfoText.innerText = data;
            modal.classList.remove("hidden");
        }

        function closeModal() {
            modal.classList.add("hidden");
            lastResult = null;
            // Short delay before resuming scan to prevent instant re-trigger
            setTimeout(() => { scanning = true; }, 1000);
        }

        async function submitToSheet() {
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        id: lastResult,
                        info: "Checked In"
                    })
                });

                alert("Success! Attendance stored.");
                closeModal();
            } catch (e) {
                alert("Network error. Try again.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirm";
            }
        }
    </script>

    <style>
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(200px); }
        }
        #scan-line {
            animation: bounce 3s infinite ease-in-out;
        }
    </style>
</body>
</html>
