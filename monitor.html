<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@vanilla-calendar/pro/build/vanilla-calendar.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@vanilla-calendar/pro/build/vanilla-calendar.min.js" defer></script>
    <style>
        body {
            background: radial-gradient(at top left, #1e293b, transparent),
                        radial-gradient(at bottom right, #334155, transparent);
            background-color: #0f172a;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .vanilla-calendar { 
            background: transparent !important; 
            border: none !important;
            color: white !important;
        }
        .vanilla-calendar-day__btn { color: white !important; }
        .vanilla-calendar-day__btn_active { background: #3b82f6 !important; border-radius: 12px; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="font-sans min-h-screen text-white p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tight">Monitoring <span class="text-blue-400">Hub</span></h1>
                <p class="text-slate-400 text-sm">Real-time attendance insights</p>
            </div>
            <a href="index.html" class="glass px-5 py-2 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-white/10 transition">Open Scanner</a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1">
                <div class="glass rounded-[2rem] p-6 shadow-2xl">
                    <h2 class="text-sm font-bold text-blue-400 uppercase tracking-[0.2em] mb-4">Select Date</h2>
                    <div id="calendar"></div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass rounded-[2rem] overflow-hidden shadow-2xl flex flex-col h-[500px]">
                    <div class="p-6 border-b border-white/10 flex justify-between items-center">
                        <div>
                            <h2 id="display-date" class="text-xl font-bold">Today</h2>
                            <p id="record-count" class="text-xs text-slate-400">0 records found</p>
                        </div>
                        <button onclick="fetchData()" class="p-2 hover:bg-white/10 rounded-lg transition">
                            <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>

                    <div class="flex-grow overflow-y-auto p-4">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-slate-500 text-[10px] uppercase tracking-widest border-b border-white/5">
                                    <th class="py-3 px-2">Time</th>
                                    <th class="py-3 px-2">Identification</th>
                                    <th class="py-3 px-2">Status</th>
                                </tr>
                            </thead>
                            <tbody id="attendance-body" class="text-sm">
                                <tr>
                                    <td colspan="3" class="py-10 text-center text-slate-500 italic">Select a date to load data</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use the SAME Web App URL from your Scanner
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1ZB3iMCv80jB4jkBsFz13KXvX9Ilv6VC-5gDlb4vZUcYiVdsodLqLNg_hSs6BsPQk/exec"; 
        let allData = [];

        // Initialize Calendar
        document.addEventListener('DOMContentLoaded', () => {
            const calendar = new VanillaCalendar('#calendar', {
                settings: {
                    selection: { day: 'single' },
                    selected: { dates: [new Date().toISOString().split('T')[0]] },
                },
                actions: {
                    clickDay(event, dates) {
                        filterDataByDate(dates[0]);
                    },
                },
            });
            calendar.init();
            fetchData(); // Initial load
        });

        async function fetchData() {
            const body = document.getElementById('attendance-body');
            body.innerHTML = '<tr><td colspan="3" class="py-10 text-center animate-pulse">Synchronizing with Sheet...</td></tr>';
            
            try {
                // We add a GET request to your Apps Script
                const response = await fetch(SCRIPT_URL + "?action=read");
                allData = await response.json();
                
                // Default filter to today
                const today = new Date().toISOString().split('T')[0];
                filterDataByDate(today);
            } catch (e) {
                body.innerHTML = '<tr><td colspan="3" class="py-10 text-center text-red-400">Error connecting to database</td></tr>';
            }
        }

        function filterDataByDate(selectedDate) {
            document.getElementById('display-date').innerText = new Date(selectedDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            
            const filtered = allData.filter(row => {
                const rowDate = new Date(row.timestamp).toISOString().split('T')[0];
                return rowDate === selectedDate;
            });

            renderTable(filtered);
        }

        function renderTable(data) {
            const body = document.getElementById('attendance-body');
            document.getElementById('record-count').innerText = `${data.length} records found`;

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="3" class="py-10 text-center text-slate-500 italic text-xs">No attendance recorded for this day</td></tr>';
                return;
            }

            body.innerHTML = data.map(row => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition">
                    <td class="py-4 px-2 font-mono text-blue-300 text-xs">${new Date(row.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                    <td class="py-4 px-2 font-bold">${row.id}</td>
                    <td class="py-4 px-2">
                        <span class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-1 rounded-md border border-blue-400/20 uppercase font-black">${row.info}</span>
                    </td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
