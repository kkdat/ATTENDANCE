<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCGNHS Attendance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f4f8; /* Very light blue-grey background */
            color: #1e3a8a; /* Deep Navy Blue */
            min-height: 100vh;
        }
        /* Glass card with blue tint */
        .card { 
            background: white; 
            border: 1px solid #d1e2f3; 
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.08); 
        }
        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        #scan-line {
            height: 3px;
            background: #2563eb; /* Royal Blue */
            box-shadow: 0 0 20px #3b82f6;
            position: absolute;
            width: 100%;
            animation: scan 3s infinite linear;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        /* Custom Select Styling */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%231e3a8a' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>
<body class="flex flex-col items-center py-10 px-4">

    <div class="w-full max-w-lg mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black tracking-tight text-blue-900 uppercase">Attendance<span class="text-blue-600">Pro</span></h1>
            <p class="text-blue-500 text-[10px] font-bold uppercase tracking-[0.2em]">Wilbur C. Go NHS Portal</p>
        </div>
        <div class="flex items-center text-[10px] font-bold text-blue-700 bg-blue-100 px-3 py-1.5 rounded-lg border border-blue-200">
            <span class="status-dot bg-blue-500 animate-pulse"></span> System Active
        </div>
    </div>

    <div class="card w-full max-w-lg rounded-2xl p-6 mb-6">
        <div class="flex bg-blue-50 p-1.5 rounded-xl mb-6 border border-blue-100">
            <button onclick="setStatus('Time In')" id="btn-in" class="flex-1 py-2.5 rounded-lg text-xs font-bold transition-all bg-blue-600 text-white shadow-md">TIME IN</button>
            <button onclick="setStatus('Time Out')" id="btn-out" class="flex-1 py-2.5 rounded-lg text-xs font-bold transition-all text-blue-600 hover:bg-blue-100">TIME OUT</button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-blue-400 uppercase mb-1.5 ml-1">Grade & Section</label>
                <select id="section" class="w-full bg-blue-50/50 border border-blue-100 rounded-xl px-4 py-3 text-sm text-blue-900 font-semibold focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <option>Grade 7 - ALEXANDRITE</option>
                    <option>Grade 7 - RUBY</option>
                    <option>Grade 8 - AQUAMARINE</option>
                    <option>Grade 8 - DIAMOND</option>
                    <option>Grade 9 - AMETHYST</option>
                    <option>Grade 9 - MOONSTONE</option>
                    <option>Grade 10 - EMERALD</option>
                    <option>Grade 10 - JADE</option>
                    <option>Grade 11 - ABM</option>
                    <option>Grade 11 - HUMSS</option>
                    <option>Grade 11 - TVL</option>
                    <option>Grade 12 - ABM</option>
                    <option>Grade 12 - HUMSS</option>
                    <option>Grade 12 - TVL</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-blue-400 uppercase mb-1.5 ml-1">Subject</label>
                <select id="subject" class="w-full bg-blue-50/50 border border-blue-100 rounded-xl px-4 py-3 text-sm text-blue-900 font-semibold focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <option>ENGLISH</option>
                    <option>MATHEMATICS</option>
                    <option>SCIENCE</option>
                    <option>FILIPINO</option>
                    <option>HISTORY</option>
                    <option>ICT Specialization</option>
                </select>
            </div>
        </div>
    </div>

    <div id="setup-view" class="w-full max-w-lg">
        <button onclick="initCamera()" class="w-full py-4 bg-blue-900 hover:bg-blue-800 text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
            START SCANNER
        </button>
    </div>

    <div id="scanner-view" class="hidden w-full max-w-lg card rounded-2xl p-3 border-2 border-blue-100">
        <div class="relative rounded-xl overflow-hidden aspect-square bg-slate-900 shadow-inner">
            <video id="video" class="w-full h-full object-cover opacity-80"></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div id="scan-line"></div>
            <div class="absolute inset-0 border-[30px] border-blue-900/40 pointer-events-none"></div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-blue-900/40 backdrop-blur-md z-50 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl border border-blue-100">
            <div class="flex items-center gap-4 mb-6">
                <div class="p-3 bg-blue-50 text-blue-600 rounded-2xl">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <h2 class="text-xl font-bold text-blue-900 leading-tight">Identity<br>Verification</h2>
            </div>
            
            <div class="space-y-3 mb-8">
                <div class="p-4 bg-blue-50/50 rounded-2xl border border-blue-100">
                    <span class="text-[10px] font-bold text-blue-400 uppercase">Student Credentials</span>
                    <div id="qr-result" class="text-lg font-bold text-blue-900 mt-1 truncate">--</div>
                </div>
                <div id="modal-details" class="text-xs font-bold text-blue-600/70 space-y-2 px-1 uppercase tracking-tight">
                    </div>
            </div>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3.5 text-blue-400 font-bold hover:bg-blue-50 rounded-xl transition-all">RETRY</button>
                <button id="confirm-btn" onclick="sendData()" class="flex-1 py-3.5 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">CONFIRM</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGS_QWW5aYXiD-7_MuBYsu9SX8qehvVDcPeXAgZDQgQjcTiLkqqQI1mHQRESv5dkU/exec"; 
        let currentStatus = "Time In";
        let scanning = false;
        let qrData = null;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas').getContext('2d');

        function setStatus(s) {
            currentStatus = s;
            const btnIn = document.getElementById('btn-in');
            const btnOut = document.getElementById('btn-out');
            if(s === 'Time In') {
                btnIn.className = "flex-1 py-2.5 rounded-lg text-xs font-bold bg-blue-600 text-white shadow-md";
                btnOut.className = "flex-1 py-2.5 rounded-lg text-xs font-bold text-blue-600 hover:bg-blue-100";
            } else {
                btnOut.className = "flex-1 py-2.5 rounded-lg text-xs font-bold bg-blue-900 text-white shadow-md";
                btnIn.className = "flex-1 py-2.5 rounded-lg text-xs font-bold text-blue-600 hover:bg-blue-100";
            }
        }

        async function initCamera() {
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('scanner-view').classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            scanning = true;
            requestAnimationFrame(tick);
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                const cvs = document.getElementById('canvas');
                cvs.width = video.videoWidth; 
                cvs.height = video.videoHeight;
                canvas.drawImage(video, 0, 0, cvs.width, cvs.height);
                const img = canvas.getImageData(0, 0, cvs.width, cvs.height);
                const code = jsQR(img.data, img.width, img.height);
                if (code) {
                    qrData = code.data;
                    showModal();
                }
            }
            if (scanning) requestAnimationFrame(tick);
        }

        function showModal() {
            scanning = false;
            document.getElementById('qr-result').innerText = qrData;
            document.getElementById('modal-details').innerHTML = `
                <div class="flex justify-between"><span>Section</span><span class="text-blue-900 font-black">${document.getElementById('section').value}</span></div>
                <div class="flex justify-between"><span>Status</span><span class="text-blue-900 font-black">${currentStatus}</span></div>
            `;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            qrData = null;
            setTimeout(() => { scanning = true; tick(); }, 1200);
        }

        async function sendData() {
            const btn = document.getElementById('confirm-btn');
            btn.disabled = true; 
            btn.innerText = "SYNCING...";

            const payload = {
                timestamp: new Date().toLocaleString(),
                rawData: qrData,
                section: document.getElementById('section').value,
                subject: document.getElementById('subject').value,
                status: currentStatus
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                closeModal();
            } catch (e) {
                alert("Connection Error.");
            } finally {
                btn.disabled = false; 
                btn.innerText = "CONFIRM";
            }
        }
    </script>
</body>
</html>
