<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance Pro | Advanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body {
            background: radial-gradient(at top left, #6366f1, transparent),
                        radial-gradient(at bottom right, #3b82f6, transparent),
                        radial-gradient(at bottom left, #ec4899, transparent);
            background-color: #0f172a;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(200px); opacity: 1; }
        }
        #scan-line { animation: bounce 2.5s infinite ease-in-out; }
        
        /* Custom styling for dropdowns */
        select option { background-color: #1e293b; color: white; }
    </style>
</head>
<body class="font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full mx-auto">
        <header class="py-4 text-center">
            <h1 class="text-4xl font-black text-white tracking-tighter">Attendance <span class="text-blue-400">Pro</span></h1>
            <p class="text-blue-100/70 text-xs font-medium uppercase tracking-widest mt-1">Registry Control Panel</p>
        </header>

        <div id="config-card" class="glass rounded-[2rem] p-6 mb-6 shadow-xl">
            <h2 class="text-white font-bold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                Session Settings
            </h2>
            
            <div class="space-y-4">
                <div class="flex p-1 bg-black/20 rounded-xl">
                    <button onclick="setStatus('Time In')" id="btn-in" class="flex-1 py-2 rounded-lg text-sm font-bold transition-all bg-blue-600 text-white">TIME IN</button>
                    <button onclick="setStatus('Time Out')" id="btn-out" class="flex-1 py-2 rounded-lg text-sm font-bold transition-all text-white/50">TIME OUT</button>
                </div>

                <div>
                    <label class="text-[10px] text-blue-300 font-bold uppercase ml-2">Grade & Section</label>
                    <select id="gradeSection" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-all">
                        <option value="G11-Alpha">Grade 11 - Alpha</option>
                        <option value="G11-Beta">Grade 11 - Beta</option>
                        <option value="G12-Sigma">Grade 12 - Sigma</option>
                        <option value="G12-Delta">Grade 12 - Delta</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] text-blue-300 font-bold uppercase ml-2">Subject</label>
                    <select id="subject" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-all">
                        <option value="Mathematics">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="ICT / Programming">ICT / Programming</option>
                        <option value="Physical Education">Physical Education</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="setup-container" class="text-center">
            <button onclick="startCamera()" class="glass w-full py-5 rounded-[2rem] text-white font-bold text-lg shadow-xl hover:bg-white/20 transition-all active:scale-95 border border-white/30">
                Start Secure Scanner
            </button>
        </div>

        <div id="scanner-container" class="hidden relative glass rounded-[2.5rem] overflow-hidden shadow-2xl p-3">
            <div class="relative rounded-[2rem] overflow-hidden aspect-square bg-black">
                <video id="video" class="w-full h-full object-cover" playsinline></video>
                <canvas id="canvas" class="hidden"></canvas>
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="w-64 h-64 border border-white/40 rounded-3xl"></div>
                    <div id="scan-line" class="absolute w-64 h-1 bg-gradient-to-r from-transparent via-blue-400 to-transparent shadow-[0_0_20px_#60a5fa] top-1/4"></div>
                </div>
            </div>
            <div id="loading-msg" class="py-4 text-center text-white/60 font-medium text-[10px] tracking-widest uppercase italic">
                Awaiting student QR...
            </div>
        </div>

        <div id="modal" class="hidden fixed inset-0 bg-slate-950/60 backdrop-blur-md flex items-center justify-center p-6 z-50">
            <div class="glass text-white rounded-[2.5rem] w-full max-w-sm p-8 shadow-2xl border border-white/30">
                <h3 class="text-2xl font-bold text-center mb-6">Confirm Record</h3>
                
                <div class="space-y-3 mb-8">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                        <p class="text-[10px] font-bold text-blue-400 uppercase">Student Identifier</p>
                        <div id="scannedInfo" class="text-lg font-mono mt-1">--</div>
                    </div>
                    
                    <div id="summary-details" class="text-xs text-white/60 space-y-1 px-2">
                        </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="closeModal()" class="py-4 text-white/70 font-bold hover:text-white">Retry</button>
                    <button onclick="submitToSheet()" id="submitBtn" class="py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-lg transition-all">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE"; 
        const video = document.getElementById("video");
        const canvasElement = document.getElementById("canvas");
        const canvas = canvasElement.getContext("2d");
        const modal = document.getElementById("modal");
        const scannedInfoText = document.getElementById("scannedInfo");
        
        let scanning = false;
        let lastResult = null;
        let currentStatus = "Time In";

        function setStatus(status) {
            currentStatus = status;
            const btnIn = document.getElementById('btn-in');
            const btnOut = document.getElementById('btn-out');
            
            if(status === 'Time In') {
                btnIn.className = "flex-1 py-2 rounded-lg text-sm font-bold bg-blue-600 text-white";
                btnOut.className = "flex-1 py-2 rounded-lg text-sm font-bold text-white/50";
            } else {
                btnOut.className = "flex-1 py-2 rounded-lg text-sm font-bold bg-pink-600 text-white";
                btnIn.className = "flex-1 py-2 rounded-lg text-sm font-bold text-white/50";
            }
        }

        function startCamera() {
            document.getElementById("setup-container").classList.add("hidden");
            document.getElementById("scanner-container").classList.remove("hidden");
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    video.srcObject = stream;
                    video.setAttribute("playsinline", true);
                    video.play();
                    scanning = true;
                    requestAnimationFrame(tick);
                });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code) onScanSuccess(code.data);
            }
            requestAnimationFrame(tick);
        }

        function onScanSuccess(data) {
            scanning = false;
            lastResult = data;
            
            // Expected QR format "Name | ID"
            scannedInfoText.innerText = data;
            
            const summary = document.getElementById('summary-details');
            summary.innerHTML = `
                <p>📍 Section: ${document.getElementById('gradeSection').value}</p>
                <p>📚 Subject: ${document.getElementById('subject').value}</p>
                <p>🕒 Action: <span class="font-bold text-white">${currentStatus}</span></p>
            `;
            
            modal.classList.remove("hidden");
        }

        function closeModal() {
            modal.classList.add("hidden");
            setTimeout(() => { scanning = true; }, 1000);
        }

        async function submitToSheet() {
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "Syncing...";

            // Split QR data if it contains both Name and ID (e.g., "John Doe, 12345")
            // Or just send the raw string if it's just the ID
            const payload = {
                rawData: lastResult,
                section: document.getElementById('gradeSection').value,
                subject: document.getElementById('subject').value,
                status: currentStatus,
                timestamp: new Date().toLocaleString()
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                alert("Attendance Logged Successfully!");
                closeModal();
            } catch (e) {
                alert("Error connecting to Sheets.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirm";
            }
        }
    </script>
</body>
</html>
