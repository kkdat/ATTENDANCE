<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { background-color: #0f172a; background: radial-gradient(at top left, #6366f1, transparent), radial-gradient(at bottom right, #3b82f6, transparent); min-height: 100vh; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        @keyframes scan { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(240px); } }
        #scan-line { animation: scan 2s infinite ease-in-out; }
    </style>
</head>
<body class="flex flex-col items-center p-6">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-black tracking-tighter">ATTENDANCE <span class="text-blue-400">PRO</span></h1>
        <p class="text-[10px] tracking-[0.3em] text-blue-300/60 uppercase">Registry Management System</p>
    </header>

    <div class="glass w-full max-w-md rounded-3xl p-6 mb-6">
        <div class="grid grid-cols-2 gap-2 mb-4 bg-black/20 p-1 rounded-xl">
            <button onclick="setStatus('Time In')" id="btn-in" class="py-2 rounded-lg text-xs font-bold bg-blue-600">TIME IN</button>
            <button onclick="setStatus('Time Out')" id="btn-out" class="py-2 rounded-lg text-xs font-bold text-white/40">TIME OUT</button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-blue-400 uppercase ml-1">Grade & Section</label>
                <select id="section" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm">
                    <option>Grade 11 - Emerald</option>
                    <option>Grade 11 - Diamond</option>
                    <option>Grade 12 - Ruby</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-blue-400 uppercase ml-1">Current Subject</label>
                <select id="subject" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm">
                    <option>Practical Research</option>
                    <option>General Mathematics</option>
                    <option>ICT Specialization</option>
                </select>
            </div>
        </div>
    </div>

    <div id="setup-view" class="w-full max-w-md">
        <button onclick="initCamera()" class="w-full py-5 bg-white text-slate-900 font-bold rounded-2xl shadow-xl active:scale-95 transition-all">
            Open Scanner
        </button>
    </div>

    <div id="scanner-view" class="hidden w-full max-w-md relative glass p-2 rounded-[2rem]">
        <div class="relative rounded-[1.5rem] overflow-hidden aspect-square bg-black">
            <video id="video" class="w-full h-full object-cover"></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-64 h-64 border border-white/20 rounded-2xl"></div>
                <div id="scan-line" class="absolute w-64 h-1 bg-blue-400 shadow-[0_0_15px_#60a5fa]"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-8 border border-white/20">
            <h2 class="text-xl font-bold text-center mb-6">Verify Scan</h2>
            <div class="bg-white/5 border border-white/10 p-4 rounded-2xl mb-6">
                <p class="text-[10px] text-blue-400 font-bold uppercase">Scanned Data</p>
                <div id="qr-result" class="text-lg font-mono mt-1 truncate">--</div>
            </div>
            <div id="modal-details" class="text-xs text-white/50 space-y-1 mb-8"></div>
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold text-white/60">Cancel</button>
                <button id="confirm-btn" onclick="sendData()" class="flex-1 py-4 bg-blue-600 rounded-2xl font-bold">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGS_QWW5aYXiD-7_MuBYsu9SX8qehvVDcPeXAgZDQgQjcTiLkqqQI1mHQRESv5dkU/exec"; 
        let currentStatus = "Time In";
        let scanning = false;
        let qrData = null;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas').getContext('2d');

        function setStatus(s) {
            currentStatus = s;
            document.getElementById('btn-in').className = s === 'Time In' ? 'py-2 rounded-lg text-xs font-bold bg-blue-600' : 'py-2 rounded-lg text-xs font-bold text-white/40';
            document.getElementById('btn-out').className = s === 'Time Out' ? 'py-2 rounded-lg text-xs font-bold bg-pink-600' : 'py-2 rounded-lg text-xs font-bold text-white/40';
        }

        async function initCamera() {
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('scanner-view').classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.play();
            scanning = true;
            requestAnimationFrame(tick);
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                const cvs = document.getElementById('canvas');
                cvs.width = video.videoWidth; cvs.height = video.videoHeight;
                canvas.drawImage(video, 0, 0, cvs.width, cvs.height);
                const img = canvas.getImageData(0, 0, cvs.width, cvs.height);
                const code = jsQR(img.data, img.width, img.height);
                if (code) {
                    qrData = code.data;
                    showModal();
                }
            }
            if (scanning) requestAnimationFrame(tick);
        }

        function showModal() {
            scanning = false;
            document.getElementById('qr-result').innerText = qrData;
            document.getElementById('modal-details').innerHTML = `
                <p>Section: ${document.getElementById('section').value}</p>
                <p>Subject: ${document.getElementById('subject').value}</p>
                <p>Status: ${currentStatus}</p>
            `;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            qrData = null;
            setTimeout(() => { scanning = true; tick(); }, 1000);
        }

        async function sendData() {
            const btn = document.getElementById('confirm-btn');
            btn.disabled = true; btn.innerText = "Syncing...";

            const payload = {
                timestamp: new Date().toLocaleString(),
                rawData: qrData,
                section: document.getElementById('section').value,
                subject: document.getElementById('subject').value,
                status: currentStatus
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                alert("Success! Record saved to sheet.");
                closeModal();
            } catch (e) {
                alert("Sync Error. Check your SCRIPT_URL.");
            } finally {
                btn.disabled = false; btn.innerText = "Confirm";
            }
        }
    </script>
</body>
</html>
